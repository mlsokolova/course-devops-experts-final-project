apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: quakewatch
  namespace: final-project
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: quakewatch
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 50
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 10 # used to restrict the flapping of replica count
      policies:
      - type: Pods # scale down unit
        value: 1 # scale down by 1 replica
        periodSeconds: 5 # time period between scale down actions
      selectPolicy: Min # select the minimum number of replicas
    scaleUp:
      stabilizationWindowSeconds: 0 
      policies:
      - type: Pods # scale up unit
        value: 1 # scale up by 1 replica
        periodSeconds: 1 # time period between scale up actions
      

      