# Default values for quakewatch.
# Install: helm install quakewatch ./helm -n final-project --create-namespace

nameOverride: ""
fullnameOverride: ""

configMap:
  name: quakewatch

secret:
  name: quakewatch
  create: true
  # Leave empty to auto-generate on first install.
  # Set explicitly to use a fixed token.
  quackToken: ""

image:
  repository: mlsokolova/quakewatch
  tag: "3.3.1"
  pullPolicy: IfNotPresent

quakewatch:
  name: quakewatch
  replicaCount: 1
  service:
    type: NodePort
    port: 5000
  resources:
    requests:
      cpu: "0.1"
      memory: 250Mi
    limits:
      cpu: "1"
      memory: 500Mi
  initContainers:
    waitForDuckdb:
      image: busybox:1.36

duckdb:
  name: duckdb
  serviceName: duckdb
  replicaCount: 1
  service:
    type: ClusterIP
    httpPort: 5000
    quackPort: 9494
  resources:
    requests:
      cpu: "0.1"
      memory: 250Mi
    limits:
      cpu: "1"
      memory: 500Mi

config:
  quakewatchLogPath: /tmp/logs
  mplBackend: Agg
  mplConfigDir: /tmp/matplotlib
  duckdbPath: /data/earthquakes.duckdb
  quackPort: "9494"

persistence:
  enabled: true
  pv:
    create: true
    name: duckdb-data
    storage: 1Gi
    accessMode: ReadWriteMany
    reclaimPolicy: Retain
    storageClassName: ""
    hostPath: /data/duckdb
  pvc:
    name: duckdb-data
    storage: 1Gi
    accessMode: ReadWriteMany
    storageClassName: ""

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 50
  targetMemoryUtilizationPercentage: 50
  scaleDown:
    stabilizationWindowSeconds: 10
    pods: 1
    periodSeconds: 5
  scaleUp:
    stabilizationWindowSeconds: 0
    pods: 1
    periodSeconds: 1

cronjob:
  enabled: true
  name: quakewatch-health-check
  schedule: "*/1 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 60
  failedJobsHistoryLimit: 180
  backoffLimit: 1
  image: curlimages/curl:8.20.0
  healthCheckPath: /graph-earthquakes

metricsServer:
  enabled: false
  image: registry.k8s.io/metrics-server/metrics-server:v0.8.1
