apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "quakewatch.fullname" . }}-test-connection"
  labels:
    {{- include "quakewatch.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox:1.36
      command: ['wget']
      args: ['{{ include "quakewatch.quakewatchName" . }}:{{ .Values.quakewatch.service.port }}']
  restartPolicy: Never
