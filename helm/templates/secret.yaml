{{- if .Values.secret.create }}
{{- $secretName := include "quakewatch.secretName" . -}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $existingToken := "" -}}
{{- if and $existing $existing.data (hasKey $existing.data "QUACK__TOKEN") -}}
{{- $existingToken = (index $existing.data "QUACK__TOKEN" | b64dec) -}}
{{- end -}}
{{- $token := .Values.secret.quackToken | default $existingToken | default (randAlphaNum 32) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "quakewatch.labels" . | nindent 4 }}
type: Opaque
stringData:
  QUACK__TOKEN: {{ $token | quote }}
{{- end }}
