# 1. WORKFLOW IDENTITY
name: closed pull request into the main branch
run-name: build and push the Docker image

# 2. TRIGGER EVENTS
on:
  pull_request:
    # The closed event includes both merged and unmerged pull requests.
    # Add a merged-only job condition before relying on this for releases.
    types:
      - 'closed'
    # Only pull requests targeting the stable branch can trigger a release.
    branches:
      - 'main'
    # Build a new image only when application or Dockerfile content changed.
    # These filters match added, modified, and deleted files.
    paths:
      - 'Quakewatch/**'
      - 'Dockerfile'

# 4. JOBS AND STEPS
jobs:
  build-and-push-docker-image:
    # Recommended release guard:
    # if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: checkout the code
        # For a closed pull request, checkout resolves the commit selected by
        # the pull_request event.
        uses: actions/checkout@v6

      - name: build the Docker image
        # The source branch name becomes the Docker image tag, so version
        # branch names must be valid Docker tags (for example, 3.3.1).
        run: docker build -t ${{ vars.DOCKERHUB_USERNAME }}/quakewatch:${{ github.event.pull_request.head.ref }} .

      - name: login to Docker Hub
        # Configure DOCKERHUB_USERNAME as a repository variable and
        # DOCKERHUB_TOKEN as a repository secret in GitHub Actions.
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: push the Docker image
        # Publish the same versioned image built in the previous step.
        run: docker push ${{ vars.DOCKERHUB_USERNAME }}/quakewatch:${{ github.event.pull_request.head.ref }}